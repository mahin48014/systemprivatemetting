<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div id="login" class="login-box">
    <h2>Private Meeting Room</h2>
    <input id="name" placeholder="Username">
    <input id="pass" placeholder="Admin password (optional)">
    <button onclick="join()">Enter Chat</button>
  </div>

  <div id="chat" class="chat-box hidden">
    <div class="header">Private Room</div>
    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input id="msg" placeholder="Type message...">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>

  <div id="adminPanel" class="admin hidden">
    <h3>👑 Admin Panel</h3>
    <div id="userList"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
