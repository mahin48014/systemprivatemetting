<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ULTRA CHAT — Private Nexus</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app">
  <!-- LOGIN VIEW -->
  <div id="login" class="login-box">
    <h2><i class="fas fa-comet"></i> ULTRA CHAT</h2>
    <input type="text" id="name" placeholder="Enter username" autocomplete="off">
    <input type="password" id="pass" placeholder="Admin password (optional)">
    <button onclick="join()"><i class="fas fa-arrow-right-to-bracket"></i> Enter Nexus</button>
    <div class="login-hint">✨ private encrypted room vibe | Admin pass: <strong>ultraadmin2025</strong></div>
  </div>

  <!-- CHAT INTERFACE -->
  <div id="chat" class="chat-box hidden">
    <div class="header">
      <span><i class="fas fa-lock"></i> Private Chamber</span>
      <div class="badge-room" id="onlineBadge">🌐 0 online</div>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-box">
      <input type="text" id="msg" placeholder="Type a cosmic message..." autocomplete="off">
      <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- ADMIN DASHBOARD (floating) -->
  <div id="adminPanel" class="admin hidden">
    <h3><i class="fas fa-crown"></i> Admin core</h3>
    <div id="userList">— loading users —</div>
    <div class="admin-footer"><i class="fas fa-gavel"></i> click kick to remove</div>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>
